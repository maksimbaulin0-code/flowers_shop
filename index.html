<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RENERIE CIEL</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --card-bg: #0a0a0a;
            --accent: #00ff88;
            --accent-dim: rgba(0, 255, 136, 0.1);
            --text-main: #ffffff;
            --text-dim: #666666;
            --border: #1a1a1a;
            --glass: rgba(255, 255, 255, 0.03);
            --status-paid: #00ff88;
            --status-pending: #ffcc00;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Geist', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0; padding: 0;
            line-height: 1.5;
            overflow-x: hidden;
        }

        #app { padding: 20px; padding-bottom: 120px; }

        h1 { font-size: 28px; font-weight: 800; letter-spacing: -1px; margin: 0; text-transform: uppercase; }
        .subtitle { color: var(--text-dim); font-size: 13px; margin-bottom: 30px; display: block; }

        .page { display: none; }
        .page.active { display: block; }

        /* Каталог */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; position: relative; transition: transform 0.2s; }
        .card:active { transform: scale(0.97); }
        .card-img { width: 100%; height: 180px; object-fit: cover; }
        .card-content { padding: 14px; }
        .card-price { font-size: 18px; font-weight: 700; color: var(--accent); }

        /* Профиль и заказы */
        .order-card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 16px; padding: 16px; margin-bottom: 12px;
        }
        .order-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .order-status { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 6px; text-transform: uppercase; }
        .status-paid { background: var(--accent-dim); color: var(--accent); }
        .status-pending { background: rgba(255, 204, 0, 0.1); color: #ffcc00; }
        .order-details { 
            display: none; margin-top: 10px; padding-top: 10px; 
            border-top: 1px dashed var(--border); font-size: 13px; 
        }
        .order-card.open .order-details { display: block; }

        /* Оплата (Loading) */
        .pay-loading { text-align: center; padding: 30px 10px; }
        .spinner {
            width: 40px; height: 40px; border: 4px solid var(--accent-dim);
            border-top: 4px solid var(--accent); border-radius: 50%;
            margin: 0 auto 20px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .retry-link {
            display: block; margin: 15px 0; color: var(--accent);
            font-size: 14px; text-decoration: none; border: 1px dashed var(--accent);
            padding: 12px; border-radius: 12px;
        }

        /* Формы и модалки */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; padding: 20px; overflow-y: auto; }
        .input-group { margin-bottom: 15px; }
        input, textarea { width: 100%; background: var(--card-bg); border: 1px solid var(--border); color: #fff; padding: 14px; border-radius: 12px; outline: none; }
        .btn { background: var(--accent); color: #000; border: none; padding: 16px; border-radius: 14px; font-weight: 700; width: 100%; cursor: pointer; }
        .btn-secondary { background: var(--glass); color: var(--text-main); border: 1px solid var(--border); }
        
        .nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 40px); max-width: 450px;
            background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 24px;
            display: flex; padding: 6px; z-index: 100;
        }
        .nav-btn { flex: 1; padding: 12px; text-align: center; font-size: 12px; color: var(--text-dim); border-radius: 18px; }
        .nav-btn.active { background: var(--glass); color: var(--accent); }
    </style>
</head>
<body>

<div id="app">
    <div id="shop-page" class="page active">
        <h1>Renerie Ciel</h1>
        <span class="subtitle">Premium Floral Boutique</span>
        <div class="grid" id="catalog-container"></div>
    </div>

    <div id="profile-page" class="page">
        <h1>Мои заказы</h1>
        <span class="subtitle">Нажмите на заказ, чтобы увидеть детали</span>
        <div id="orders-container"></div>
    </div>

    <div id="admin-page" class="page">
        <h1>Управление</h1>
        <div style="background: var(--card-bg); padding: 15px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 20px;">
            <input type="text" id="add-name" placeholder="Название" class="input-group">
            <input type="number" id="add-price" placeholder="Цена" class="input-group">
            <input type="text" id="add-img" placeholder="URL фото" class="input-group">
            <input type="number" id="add-stock" placeholder="Кол-во" class="input-group">
            <button class="btn" onclick="apiAction('admin_add')">Добавить товар</button>
        </div>
        <div id="admin-list"></div>
    </div>
</div>

<div id="product-modal" class="modal">
    <div class="modal-content" id="modal-body"></div>
</div>

<nav class="nav">
    <div class="nav-btn active" onclick="switchPage('shop', this)">Каталог</div>
    <div class="nav-btn" onclick="switchPage('profile', this)">Профиль</div>
    <div class="nav-btn" id="nav-admin" style="display: none;" onclick="switchPage('admin', this)">Админ</div>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    const API_URL = 'http://31.129.101.17:5678/webhook-test/9807132c-fdc3-4e47-bb28-144e16feebe1';
    const MY_ID = 784237794;

    let products = [];
    let paymentCheckInterval;
    let currentOrder = { id: null, count: 1 };

    async function apiAction(action, extraData = {}) {
        const user = tg.initDataUnsafe?.user || {};
        const payload = {
            action,
            userId: user.id,
            username: user.username || 'unknown',
            firstName: user.first_name || 'Guest',
            ...extraData
        };

        if (action === 'admin_add') {
            payload.name = document.getElementById('add-name').value;
            payload.price = document.getElementById('add-price').value;
            payload.image = document.getElementById('add-img').value;
            payload.stock = document.getElementById('add-stock').value;
        }

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if (action === 'get_items') { products = data; renderCatalog(); renderAdmin(); }
            return data;
        } catch(e) { console.error(e); }
    }

    function renderCatalog() {
        const container = document.getElementById('catalog-container');
        container.innerHTML = products.map(p => `
            <div class="card" onclick="openProduct(${p.id})">
                <img src="${p.image}" class="card-img">
                <div class="card-content">
                    <div style="font-size:14px; margin-bottom:5px;">${p.name}</div>
                    <div class="card-price">${p.price} ₽</div>
                </div>
            </div>
        `).join('');
    }

    function renderAdmin() {
        const list = document.getElementById('admin-list');
        list.innerHTML = products.map(p => `
            <div class="order-card" style="margin-bottom:10px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div><b>${p.name}</b><br><small>Stock: ${p.stock}</small></div>
                    <div style="display:flex; gap:5px;">
                        <button class="btn btn-secondary" style="padding:5px 10px;" onclick="changeLocalStock(${p.id}, -1)">-</button>
                        <input type="number" id="stock-in-${p.id}" value="${p.stock}" style="width:50px; padding:5px; text-align:center;" onchange="changeLocalStock(${p.id}, 0, this.value)">
                        <button class="btn btn-secondary" style="padding:5px 10px;" onclick="changeLocalStock(${p.id}, 1)">+</button>
                    </div>
                </div>
                <button class="btn btn-secondary" style="margin-top:10px; font-size:12px;" onclick="saveStock(${p.id})">Сохранить кол-во</button>
            </div>
        `).join('');
    }

    function changeLocalStock(id, delta, manualValue = null) {
        const p = products.find(x => x.id === id);
        if (manualValue !== null) p.stock = parseInt(manualValue) || 0;
        else p.stock = Math.max(0, p.stock + delta);
        document.getElementById(`stock-in-${id}`).value = p.stock;
    }

    async function saveStock(id) {
        const p = products.find(x => x.id === id);
        await apiAction('update_stock', { id: id, totalStock: p.stock });
        tg.showAlert("Запас обновлен");
    }

    async function loadOrders() {
        const container = document.getElementById('orders-container');
        container.innerHTML = '<p style="text-align:center; color:var(--text-dim);">Загрузка заказов...</p>';
        const orders = await apiAction('get_orders');
        
        if (!orders || orders.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:var(--text-dim); margin-top:40px;">Заказов пока нет</p>';
            return;
        }

        container.innerHTML = orders.map(o => `
            <div class="order-card" onclick="this.classList.toggle('open')">
                <div class="order-header">
                    <div>
                        <div style="font-weight:600;">Заказ #${o.orderId ? o.orderId.slice(0,8) : '000'}</div>
                        <div style="font-size:11px; color:var(--text-dim);">${o.date || ''}</div>
                    </div>
                    <div class="order-status ${o.status === 'paid' ? 'status-paid' : 'status-pending'}">${o.status}</div>
                </div>
                <div style="color:var(--accent); font-weight:700; margin-top:5px;">${o.amount} ₽</div>
                <div class="order-details">
                    <div><b>Состав:</b> ${o.details || 'Букет'}</div>
                    <div><b>Кол-во:</b> ${o.count || 1} шт.</div>
                </div>
            </div>
        `).join('');
    }

    function openProduct(id) {
        const p = products.find(x => x.id === id);
        currentOrder = { id: p.id, count: 1 };
        document.getElementById('modal-body').innerHTML = `
            <img src="${p.image}" style="width:100%; height:300px; object-fit:cover; border-radius:20px;">
            <h1 style="margin-top:15px;">${p.name}</h1>
            <div class="card-price" style="font-size:24px;">${p.price} ₽</div>
            <p style="color:var(--text-dim);">${p.description || 'Премиальный букет.'}</p>
            <div class="order-section" style="background:var(--card-bg); padding:15px; border-radius:15px; border:1px solid var(--border);">
                <label style="font-size:12px; color:var(--text-dim);">Количество</label>
                <div style="display:flex; align-items:center; gap:15px; margin-bottom:15px;">
                    <button class="btn btn-secondary" style="width:40px; padding:10px;" onclick="changeOrderCount(-1)">-</button>
                    <span id="order-c" style="font-weight:700;">1</span>
                    <button class="btn btn-secondary" style="width:40px; padding:10px;" onclick="changeOrderCount(1)">+</button>
                </div>
                <input type="text" id="c-name" placeholder="Ваше имя" style="margin-bottom:10px;">
                <input type="tel" id="c-phone" placeholder="Телефон">
                <button class="btn" style="margin-top:15px;" onclick="startPayment()">Оплатить заказ</button>
            </div>
        `;
        document.getElementById('product-modal').style.display = 'block';
        tg.BackButton.show();
        tg.BackButton.onClick(closeModal);
    }

    function changeOrderCount(d) {
        currentOrder.count = Math.max(1, currentOrder.count + d);
        document.getElementById('order-c').innerText = currentOrder.count;
    }

    async function startPayment() {
        const name = document.getElementById('c-name').value;
        const phone = document.getElementById('c-phone').value;
        if (!name || !phone) { tg.showAlert("Заполните данные!"); return; }

        const section = document.querySelector('.order-section');
        tg.MainButton.setText("СОЗДАНИЕ СЧЕТА...").show();

        const res = await apiAction('pay', {
            productId: currentOrder.id,
            count: currentOrder.count,
            customerName: name,
            customerPhone: phone
        });

        if (res?.paymentUrl) {
            section.innerHTML = `
                <div class="pay-loading">
                    <div class="spinner"></div>
                    <h3>Ожидаем оплату...</h3>
                    <a href="${res.paymentUrl}" target="_blank" class="retry-link">🔗 Ссылка на оплату</a>
                    <button class="btn btn-secondary" style="font-size:12px;" onclick="checkPaymentStatus('${res.orderId}')">Проверить вручную</button>
                </div>
            `;
            tg.MainButton.hide();
            if (res.orderId) {
                clearInterval(paymentCheckInterval);
                paymentCheckInterval = setInterval(() => checkPaymentStatus(res.orderId), 3000);
            }
            tg.openLink(res.paymentUrl);
        }
    }

    async function checkPaymentStatus(id) {
        const res = await apiAction('check_status', { orderId: id });
        if (res?.status === 'paid') {
            clearInterval(paymentCheckInterval);
            tg.HapticFeedback.notificationOccurred('success');
            tg.showAlert("Оплата принята!");
            closeModal();
            apiAction('get_items');
        }
    }

    function closeModal() {
        document.getElementById('product-modal').style.display = 'none';
        tg.BackButton.hide();
        clearInterval(paymentCheckInterval);
    }

    function switchPage(p, el) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.getElementById(p + '-page').classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        if (p === 'profile') loadOrders();
        tg.HapticFeedback.impactOccurred('light');
    }

    if (tg.initDataUnsafe?.user?.id === MY_ID) document.getElementById('nav-admin').style.display = 'block';
    apiAction('get_items');
</script>

</body>
</html>
