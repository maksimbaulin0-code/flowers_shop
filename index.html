<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RENERIE CIEL</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0c0b0d;
            --bg-elevated: #141316;
            --card-bg: rgba(20, 19, 22, 0.6);
            --accent: #d4a0a0;
            --accent-bright: #e8b4b4;
            --accent-glow: rgba(212, 160, 160, 0.15);
            --accent-glow-strong: rgba(212, 160, 160, 0.25);
            --gold: #c4a265;
            --gold-dim: rgba(196, 162, 101, 0.12);
            --text-main: #f0ece6;
            --text-dim: #7a7580;
            --text-mid: #a09aa6;
            --border: rgba(255, 255, 255, 0.06);
            --border-light: rgba(255, 255, 255, 0.1);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-heavy: rgba(255, 255, 255, 0.05);
            --gradient-card: linear-gradient(135deg, rgba(212, 160, 160, 0.05) 0%, transparent 60%);
            --gradient-hero: linear-gradient(180deg, rgba(212, 160, 160, 0.08) 0%, transparent 50%);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
            --shadow-md: 0 8px 32px rgba(0,0,0,0.4);
            --shadow-lg: 0 16px 48px rgba(0,0,0,0.5);
            --status-paid: #7ec8a0;
            --status-pending: #e0c36a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(212, 160, 160, 0.04) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(196, 162, 101, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        #app {
            position: relative;
            z-index: 1;
            padding: 0 20px 120px;
            max-width: 480px;
            margin: 0 auto;
        }

        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes floatUp {
            0% { opacity: 0; transform: translateY(20px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(212, 160, 160, 0.1); }
            50% { box-shadow: 0 0 40px rgba(212, 160, 160, 0.2); }
        }

        .brand {
            padding: 40px 0 8px;
            text-align: center;
        }

        .brand-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 36px;
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: var(--text-main);
            background: linear-gradient(135deg, var(--text-main) 0%, var(--accent) 50%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand-sub {
            font-family: 'Cormorant Garamond', serif;
            font-size: 13px;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-top: 4px;
        }

        .brand-line {
            width: 40px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            margin: 16px auto 0;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-top: 8px;
        }

        .section-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            font-weight: 400;
            letter-spacing: 1px;
            color: var(--text-main);
        }

        .section-badge {
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--accent);
            padding: 4px 12px;
            border: 1px solid var(--accent-glow-strong);
            border-radius: 20px;
            background: var(--accent-glow);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--gradient-card);
            z-index: 1;
            pointer-events: none;
            border-radius: 24px;
        }

        .card:active {
            transform: scale(0.96);
            border-color: var(--border-light);
        }

        .card-img-wrap {
            position: relative;
            overflow: hidden;
        }

        .card-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .card:hover .card-img,
        .card:active .card-img {
            transform: scale(1.05);
        }

        .card-img-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: linear-gradient(transparent, rgba(12, 11, 13, 0.8));
            z-index: 2;
        }

        .card-content {
            position: relative;
            z-index: 2;
            padding: 16px 16px 18px;
        }

        .card-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 16px;
            font-weight: 500;
            color: var(--text-main);
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .card-price {
            font-size: 17px;
            font-weight: 600;
            color: var(--accent-bright);
            letter-spacing: 0.5px;
        }

        .card-price span {
            font-size: 13px;
            font-weight: 400;
            color: var(--text-dim);
        }

        .order-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 14px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .order-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-glow-strong), transparent);
        }

        .order-card:active {
            transform: scale(0.98);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .order-id {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-main);
        }

        .order-date {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        .order-status {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 5px 12px;
            border-radius: 20px;
        }

        .status-paid {
            background: rgba(126, 200, 160, 0.12);
            color: var(--status-paid);
            border: 1px solid rgba(126, 200, 160, 0.2);
        }

        .status-pending {
            background: rgba(224, 195, 106, 0.12);
            color: var(--status-pending);
            border: 1px solid rgba(224, 195, 106, 0.2);
        }

        .order-amount {
            color: var(--accent-bright);
            font-weight: 600;
            font-size: 20px;
            margin-top: 12px;
            font-family: 'Cormorant Garamond', serif;
        }

        .order-details {
            display: none;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            font-size: 13px;
            color: var(--text-mid);
        }

        .order-card.open .order-details { display: block; }

        .order-detail-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
        }

        .order-detail-label {
            color: var(--text-dim);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .order-detail-value {
            color: var(--text-main);
            font-weight: 500;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 1000;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .modal.show {
            display: block;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .modal-content {
            padding: 0 20px 40px;
            max-width: 480px;
            margin: 0 auto;
        }

        .modal-hero {
            position: relative;
            width: calc(100% + 40px);
            margin: 0 -20px;
            height: 380px;
            overflow: hidden;
        }

        .modal-hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-hero-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 150px;
            background: linear-gradient(transparent, var(--bg));
        }

        .modal-hero-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(12, 11, 13, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid var(--border);
            font-size: 12px;
            font-weight: 500;
            color: var(--text-mid);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .modal-body {
            position: relative;
            margin-top: -40px;
        }

        .modal-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            font-weight: 400;
            line-height: 1.2;
            margin-bottom: 8px;
        }

        .modal-price {
            font-size: 28px;
            font-weight: 600;
            color: var(--accent-bright);
            margin-bottom: 16px;
        }

        .modal-desc {
            font-size: 14px;
            color: var(--text-mid);
            line-height: 1.7;
            margin-bottom: 24px;
        }

        .order-section {
            background: var(--bg-elevated);
            padding: 24px;
            border-radius: 24px;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .order-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-glow-strong), transparent);
        }

        .order-section-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        .count-selector {
            display: flex;
            align-items: center;
            gap: 0;
            background: var(--glass-heavy);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 4px;
            margin-bottom: 20px;
        }

        .count-btn {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--glass-heavy);
            border: none;
            color: var(--text-main);
            font-size: 18px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 300;
        }

        .count-btn:active {
            background: var(--accent-glow);
            color: var(--accent-bright);
        }

        .count-value {
            flex: 1;
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            color: var(--text-main);
            font-family: 'Cormorant Garamond', serif;
        }

        .input-field {
            width: 100%;
            background: var(--glass-heavy);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 16px 18px;
            border-radius: 16px;
            outline: none;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            margin-bottom: 12px;
            transition: border-color 0.3s;
        }

        .input-field:focus {
            border-color: var(--accent-glow-strong);
            background: rgba(212, 160, 160, 0.03);
        }

        .input-field::placeholder {
            color: var(--text-dim);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 18px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, var(--gold) 100%);
            color: #0c0b0d;
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        .btn-primary::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn-primary:hover::after {
            opacity: 1;
        }

        .btn-ghost {
            background: var(--glass-heavy);
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        .btn-ghost:active {
            background: var(--accent-glow);
            border-color: var(--accent-glow-strong);
        }

        .btn-ghost-sm {
            background: var(--glass-heavy);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-ghost-sm:active {
            background: var(--accent-glow);
        }

        .pay-loading {
            text-align: center;
            padding: 40px 10px;
        }

        .spinner-wrap {
            position: relative;
            width: 56px;
            height: 56px;
            margin: 0 auto 24px;
        }

        .spinner {
            width: 56px;
            height: 56px;
            border: 2px solid var(--border);
            border-top: 2px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }

        .spinner-glow {
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            background: var(--accent-glow);
            animation: pulse 2s ease-in-out infinite;
        }

        .pay-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            font-weight: 400;
            margin-bottom: 8px;
        }

        .pay-subtitle {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 20px;
        }

        .pay-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--accent-bright);
            font-size: 14px;
            text-decoration: none;
            padding: 14px 24px;
            border: 1px solid var(--accent-glow-strong);
            border-radius: 16px;
            background: var(--accent-glow);
            margin-bottom: 12px;
            transition: all 0.3s;
        }

        .pay-link:active {
            transform: scale(0.97);
            background: var(--accent-glow-strong);
        }

        .nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 440px;
            background: rgba(14, 13, 16, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 28px;
            display: flex;
            padding: 6px;
            z-index: 100;
            box-shadow: var(--shadow-lg);
        }

        .nav-btn {
            flex: 1;
            padding: 14px 8px;
            text-align: center;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--text-dim);
            border-radius: 22px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .nav-btn.active {
            background: var(--accent-glow);
            color: var(--accent-bright);
        }

        .nav-btn.active::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--accent-bright);
        }

        .admin-panel {
            background: var(--bg-elevated);
            padding: 24px;
            border-radius: 24px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .admin-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
        }

        .admin-panel-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 20px;
            color: var(--gold);
        }

        .admin-item {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 12px;
            position: relative;
            overflow: hidden;
        }

        .admin-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
        }

        .admin-item-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .admin-item-stock {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 12px;
        }

        .admin-stock-controls {
            display: flex;
            align-items: center;
            gap: 4px;
            background: var(--glass-heavy);
            border-radius: 14px;
            border: 1px solid var(--border);
            padding: 4px;
        }

        .admin-stock-input {
            width: 48px;
            text-align: center;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 14px;
            font-weight: 600;
            padding: 8px 0;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .empty-state-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            color: var(--text-dim);
            font-weight: 400;
        }

        .loading-skeleton {
            background: linear-gradient(90deg, var(--bg-elevated) 25%, var(--glass-heavy) 50%, var(--bg-elevated) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 20px;
            height: 260px;
        }

        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-light), transparent);
            margin: 24px 0;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(12, 11, 13, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            color: var(--text-main);
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            transition: all 0.2s;
        }

        .close-btn:active {
            background: rgba(212, 160, 160, 0.15);
        }
    </style>
</head>
<body>

<div id="app">
    <div id="shop-page" class="page active">
        <div class="brand">
            <div class="brand-logo">Renerie Ciel</div>
            <div class="brand-sub">Floral Boutique</div>
            <div class="brand-line"></div>
        </div>
        <div class="section-header">
            <div class="section-title">Коллекция</div>
            <div class="section-badge" id="items-count"></div>
        </div>
        <div class="grid" id="catalog-container"></div>
    </div>

    <div id="profile-page" class="page">
        <div class="brand">
            <div class="brand-logo">Мои заказы</div>
            <div class="brand-sub">История покупок</div>
            <div class="brand-line"></div>
        </div>
        <div id="orders-container"></div>
    </div>

    <div id="admin-page" class="page">
        <div class="brand">
            <div class="brand-logo">Управление</div>
            <div class="brand-sub">Панель администратора</div>
            <div class="brand-line"></div>
        </div>
        <div class="admin-panel">
            <div class="admin-panel-title">Новый товар</div>
            <input type="text" id="add-name" placeholder="Название букета" class="input-field">
            <input type="number" id="add-price" placeholder="Цена, ₽" class="input-field">
            <input type="text" id="add-img" placeholder="URL фотографии" class="input-field">
            <input type="number" id="add-stock" placeholder="Количество" class="input-field">
            <button class="btn btn-primary" onclick="apiAction('admin_add')">Добавить в коллекцию</button>
        </div>
        <div id="admin-list"></div>
    </div>
</div>

<div id="product-modal" class="modal">
    <div class="modal-content" id="modal-body"></div>
</div>

<nav class="nav">
    <div class="nav-btn active" onclick="switchPage('shop', this)">
        <span>&#9733;</span> Каталог
    </div>
    <div class="nav-btn" onclick="switchPage('profile', this)">
        <span>&#9830;</span> Профиль
    </div>
    <div class="nav-btn" id="nav-admin" style="display: none;" onclick="switchPage('admin', this)">
        <span>&#9881;</span> Админ
    </div>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    const API_URL = 'https://bikuramustar.beget.app/webhook-test/9807132c-fdc3-4e47-bb28-144e16feebe1';
    const MY_ID = 784237794;

    let products = [];
    let paymentCheckInterval;
    let currentOrder = { id: null, count: 1 };

    async function apiAction(action, extraData = {}) {
        const user = tg.initDataUnsafe?.user || {};
        const payload = {
            action,
            userId: user.id,
            username: user.username || 'unknown',
            firstName: user.first_name || 'Guest',
            ...extraData
        };

        if (action === 'admin_add') {
            payload.name = document.getElementById('add-name').value;
            payload.price = document.getElementById('add-price').value;
            payload.image = document.getElementById('add-img').value;
            payload.stock = document.getElementById('add-stock').value;
        }

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if (action === 'get_items') {
                products = data.map(item => {
                    const key = Object.keys(item)[0];
                    return typeof item[key] === 'object' ? item[key] : item;
                });
                renderCatalog(); renderAdmin();
            }
            return data;
        } catch(e) { console.error(e); }
    }

    function renderCatalog() {
        const container = document.getElementById('catalog-container');
        const countEl = document.getElementById('items-count');
        if (countEl) countEl.textContent = products.length + ' штук';

        container.innerHTML = products.map((p, i) => `
            <div class="card" onclick="openProduct(${p.id})" style="animation: floatUp 0.5s ease ${i * 0.08}s both;">
                <div class="card-img-wrap">
                    <img src="${p.image}" class="card-img" loading="lazy">
                    <div class="card-img-overlay"></div>
                </div>
                <div class="card-content">
                    <div class="card-name">${p.name}</div>
                    <div class="card-price">${p.price} <span>₽</span></div>
                </div>
            </div>
        `).join('');
    }

    function renderAdmin() {
        const list = document.getElementById('admin-list');
        list.innerHTML = products.map(p => `
            <div class="admin-item">
                <div class="admin-item-name">${p.name}</div>
                <div class="admin-item-stock">В наличии: ${p.stock} шт.</div>
                <div style="display:flex; align-items:center; justify-content:space-between;">
                    <div class="admin-stock-controls">
                        <button class="count-btn" style="width:36px;height:36px;font-size:14px;" onclick="changeLocalStock(${p.id}, -1)">-</button>
                        <input type="number" id="stock-in-${p.id}" value="${p.stock}" class="admin-stock-input" onchange="changeLocalStock(${p.id}, 0, this.value)">
                        <button class="count-btn" style="width:36px;height:36px;font-size:14px;" onclick="changeLocalStock(${p.id}, 1)">+</button>
                    </div>
                    <button class="btn-ghost-sm" onclick="saveStock(${p.id})">Сохранить</button>
                </div>
            </div>
        `).join('');
    }

    function changeLocalStock(id, delta, manualValue = null) {
        const p = products.find(x => x.id === id);
        if (manualValue !== null) p.stock = parseInt(manualValue) || 0;
        else p.stock = Math.max(0, p.stock + delta);
        document.getElementById(`stock-in-${id}`).value = p.stock;
    }

    async function saveStock(id) {
        const p = products.find(x => x.id === id);
        await apiAction('update_stock', { id: id, totalStock: p.stock });
        tg.showAlert("Запас обновлен");
    }

    async function loadOrders() {
        const container = document.getElementById('orders-container');
        container.innerHTML = `
            <div style="padding: 20px 0;">
                <div class="loading-skeleton" style="height:80px; margin-bottom:12px;"></div>
                <div class="loading-skeleton" style="height:80px; margin-bottom:12px;"></div>
            </div>
        `;
        const orders = await apiAction('get_orders');

        if (!orders || orders.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">&#10047;</div>
                    <div class="empty-state-text">Заказов пока нет</div>
                </div>
            `;
            return;
        }

        container.innerHTML = orders.map((o, i) => `
            <div class="order-card" onclick="this.classList.toggle('open')" style="animation: floatUp 0.4s ease ${i * 0.06}s both;">
                <div class="order-header">
                    <div>
                        <div class="order-id">Заказ #${o.orderId ? o.orderId.slice(0,8) : '000'}</div>
                        <div class="order-date">${o.date || ''}</div>
                    </div>
                    <div class="order-status ${o.status === 'paid' ? 'status-paid' : 'status-pending'}">${o.status === 'paid' ? 'Оплачен' : 'Ожидает'}</div>
                </div>
                <div class="order-amount">${o.amount} ₽</div>
                <div class="order-details">
                    <div class="order-detail-row">
                        <span class="order-detail-label">Состав</span>
                        <span class="order-detail-value">${o.details || 'Букет'}</span>
                    </div>
                    <div class="order-detail-row">
                        <span class="order-detail-label">Количество</span>
                        <span class="order-detail-value">${o.count || 1} шт.</span>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function openProduct(id) {
        const p = products.find(x => x.id === id);
        currentOrder = { id: p.id, count: 1 };
        document.getElementById('modal-body').innerHTML = `
            <div class="modal-hero">
                <img src="${p.image}">
                <div class="modal-hero-overlay"></div>
                <div class="modal-hero-badge">Коллекция</div>
                <button class="close-btn" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="modal-name">${p.name}</div>
                <div class="modal-price">${p.price} ₽</div>
                <div class="modal-desc">${p.description || 'Премиальный букет, составленный из свежих цветов лучшими флористами.'}</div>

                <div class="order-section">
                    <div class="order-section-title">Оформление заказа</div>

                    <label style="font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--text-dim); margin-bottom:8px; display:block;">Количество</label>
                    <div class="count-selector">
                        <button class="count-btn" onclick="changeOrderCount(-1)">−</button>
                        <span class="count-value" id="order-c">1</span>
                        <button class="count-btn" onclick="changeOrderCount(1)">+</button>
                    </div>

                    <input type="text" id="c-name" placeholder="Ваше имя" class="input-field">
                    <input type="tel" id="c-phone" placeholder="Телефон" class="input-field">
                    <button class="btn btn-primary" onclick="startPayment()">Оплатить заказ</button>
                </div>
            </div>
        `;
        const modal = document.getElementById('product-modal');
        modal.classList.add('show');
        modal.style.display = 'block';
        tg.BackButton.show();
        tg.BackButton.onClick(closeModal);
    }

    function changeOrderCount(d) {
        currentOrder.count = Math.max(1, currentOrder.count + d);
        document.getElementById('order-c').innerText = currentOrder.count;
    }

    async function startPayment() {
        const name = document.getElementById('c-name').value;
        const phone = document.getElementById('c-phone').value;
        if (!name || !phone) { tg.showAlert("Заполните данные!"); return; }

        const section = document.querySelector('.order-section');
        tg.MainButton.setText("СОЗДАНИЕ СЧЕТА...").show();

        const res = await apiAction('pay', {
            productId: currentOrder.id,
            count: currentOrder.count,
            customerName: name,
            customerPhone: phone
        });

        if (res?.paymentUrl) {
            section.innerHTML = `
                <div class="pay-loading">
                    <div class="spinner-wrap">
                        <div class="spinner-glow"></div>
                        <div class="spinner"></div>
                    </div>
                    <div class="pay-title">Ожидаем оплату</div>
                    <div class="pay-subtitle">Перейдите по ссылке для завершения</div>
                    <a href="${res.paymentUrl}" target="_blank" class="pay-link">&#10132; Ссылка на оплату</a>
                    <button class="btn btn-ghost" style="margin-top:8px; font-size:12px; letter-spacing:0.5px;" onclick="checkPaymentStatus('${res.orderId}')">Проверить статус</button>
                </div>
            `;
            tg.MainButton.hide();
            if (res.orderId) {
                clearInterval(paymentCheckInterval);
                paymentCheckInterval = setInterval(() => checkPaymentStatus(res.orderId), 3000);
            }
            tg.openLink(res.paymentUrl);
        }
    }

    async function checkPaymentStatus(id) {
        const res = await apiAction('check_status', { orderId: id });
        if (res?.status === 'paid') {
            clearInterval(paymentCheckInterval);
            tg.HapticFeedback.notificationOccurred('success');
            tg.showAlert("Оплата принята!");
            closeModal();
            apiAction('get_items');
        }
    }

    function closeModal() {
        const modal = document.getElementById('product-modal');
        modal.classList.remove('show');
        modal.style.display = 'none';
        tg.BackButton.hide();
        clearInterval(paymentCheckInterval);
    }

    function switchPage(p, el) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.getElementById(p + '-page').classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        if (p === 'profile') loadOrders();
        tg.HapticFeedback.impactOccurred('light');
    }

    if (tg.initDataUnsafe?.user?.id === MY_ID) document.getElementById('nav-admin').style.display = 'block';
    apiAction('get_items');
</script>

</body>
</html>
